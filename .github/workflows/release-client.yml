name: Release Client

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build_client:
    name: Build Client (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            package_name: civilization-client-linux-x86_64
            binary_name: client
            archive_name: civilization-client-linux-x86_64.tar.gz
          - name: Windows x86_64
            os: windows-latest
            package_name: civilization-client-windows-x86_64
            binary_name: client.exe
            archive_name: civilization-client-windows-x86_64.zip
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-client-${{ hashFiles('**/Cargo.toml') }}

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update; sudo apt-get install --no-install-recommends libasound2-dev libudev-dev libwayland-dev

      - name: Build Release Client
        run: cargo build --release --bin client

      - name: Prepare Package
        shell: bash
        run: |
          mkdir -p "dist/${{ matrix.package_name }}"
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.package_name }}/"
          cp -r assets "dist/${{ matrix.package_name }}/assets"

      - name: Create Linux Archive
        if: runner.os == 'Linux'
        shell: bash
        run: tar -czf "dist/${{ matrix.archive_name }}" -C dist "${{ matrix.package_name }}"

      - name: Create Windows Archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/${{ matrix.package_name }}" -DestinationPath "dist/${{ matrix.archive_name }}"

      - name: Upload Client Archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: dist/${{ matrix.archive_name }}

  publish_release:
    name: Publish Client Release
    runs-on: ubuntu-latest
    needs: build_client
    permissions:
      contents: write
    steps:
      - name: Download Client Archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
