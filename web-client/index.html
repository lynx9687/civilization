<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; height: 100%; }
    /* Full-viewport parent with a size derived from the viewport (not from its
       children), so bevy's fit_canvas_to_parent won't feedback-loop. */
    #game { width: 100vw; height: 100vh; overflow: hidden; }
    #game-canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script>
    // Browser autoplay policy starts every AudioContext suspended until the user
    // interacts with the page, so bevy's audio (created at startup) stays silent.
    // Wrap the AudioContext constructor to track every context the wasm creates,
    // then resume them on the first user gesture. Must run before the wasm loads.
    (function () {
      const Original = window.AudioContext || window.webkitAudioContext;
      if (!Original) return;
      const contexts = [];
      const Tracked = class extends Original {
        constructor(...args) {
          super(...args);
          contexts.push(this);
        }
      };
      window.AudioContext = Tracked;
      window.webkitAudioContext = Tracked;
      const resumeAll = () => {
        for (const ctx of contexts) {
          if (ctx.state === "suspended") ctx.resume();
        }
      };
      for (const evt of ["pointerdown", "keydown", "touchstart"]) {
        window.addEventListener(evt, resumeAll);
      }
    })();
  </script>
</head>

<body>
  <div id="game">
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module">
    import init from './client.js'

    init().catch((error) => {
      if (!error.message.startsWith("Using exceptions for control flow, don't mind me. This isn't actually an error!")) {
        throw error;
      }
    });
  </script>
</body>

</html>
